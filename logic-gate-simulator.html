        truthTable.input_names.forEach(name => { header += `${name.padEnd(10)} | `; });
        truthTable.output_names.forEach(name => { header += `${name.padEnd(10)} | `; });
        console.log(header);
        console.log('-'.repeat(header.length));
        
        // Generate truth table and store in dict
        for (let combo = 0; combo < numCombinations; combo++) {
            // Set input values
            for (let i = 0; i < numInputs; i++) {
                const bit = (combo >> (numInputs - 1 - i)) & 1;
                inputGates[i].outputs[0] = bit;
            }
            
            // Simulate with propagation
            let changed = true;
            let iterations = 0;
            const MAX_ITER = 50;
            
            while (changed && iterations < MAX_ITER) {
                changed = false;
                
                // Evaluate gates
                for (let item of ITEMS) {
                    if (item instanceof INPUT) continue;
                    if (item instanceof OUTPUT) continue;
                    
                    const oldOutputs = [...item.outputs];
                    item.evaluate();
                    
                    for (let j = 0; j < item.outputs.length; j++) {
                        if (oldOutputs[j] !== item.outputs[j]) {
                            changed = true;
                        }
                    }
                }
                
                // Propagate through connections
                for (let conn of CONNECTIONS) {
                    const fromIdx = conn.FromItem.output_names.indexOf(conn.FromItemOutName);
                    const toIdx = conn.ToItem.input_names.indexOf(conn.ToItemInName);
                    
                    if (fromIdx !== -1 && toIdx !== -1) {
                        const newVal = conn.FromItem.outputs[fromIdx];
                        if (conn.ToItem.inputs[toIdx] !== newVal) {
                            conn.ToItem.inputs[toIdx] = newVal;
                            changed = true;
                        }
                    }
                }
                
                iterations++;
            }
            
            // Get input and output values
            const inputValues = inputGates.map(g => g.outputs[0]);
            const outputValues = outputGates.map(g => g.inputs[0] || 0);
            
            // Create binary string key for dict
            const key = inputValues.join('');
            truthTable.dict[key] = outputValues.join('');
            
            // Print row
            let row = '';
            inputValues.forEach(v => { row += `${v.toString().padEnd(10)} | `; });
            outputValues.forEach(v => { row += `${v.toString().padEnd(10)} | `; });
            console.log(row);
        }
        
        // Restore original state
        for (let i = 0; i < inputGates.length; i++) {
            inputGates[i].outputs[0] = savedInputValues[i];
        }
        
        for (let i = 0; i < savedGateStates.length; i++) {
            const saved = savedGateStates[i];
            saved.item.inputs = [...saved.inputs];
            saved.item.outputs = [...saved.outputs];
        }
        
        // Final restore simulation
        let changed = true;
        let iterations = 0;
        while (changed && iterations < 50) {
            changed = false;
            for (let item of ITEMS) {
                if (item instanceof INPUT) continue;
                const oldOutputs = [...item.outputs];
                item.evaluate();
                for (let j = 0; j < item.outputs.length; j++) {
                    if (oldOutputs[j] !== item.outputs[j]) changed = true;
                }
            }
            for (let conn of CONNECTIONS) {
                const fromIdx = conn.FromItem.output_names.indexOf(conn.FromItemOutName);
                const toIdx = conn.ToItem.input_names.indexOf(conn.ToItemInName);
                if (fromIdx !== -1 && toIdx !== -1) {
                    const newVal = conn.FromItem.outputs[fromIdx];
                    if (conn.ToItem.inputs[toIdx] !== newVal) {
                        conn.ToItem.inputs[toIdx] = newVal;
                        changed = true;
                    }
                }
            }
            iterations++;
        }
        
        console.log('='.repeat(60));
        console.log(`✅ Generated ${numCombinations} combinations`);
        console.log(`   Dictionary entries: ${Object.keys(truthTable.dict).length}\n`);
        
        // Display dict preview with warnings if any issues found
        console.log('📖 Dictionary preview:');
        const previewEntries = Object.entries(truthTable.dict).slice(0, 8);
        previewEntries.forEach(([key, value]) => {
            console.log(`   ${key} → ${value}`);
        });
        if (Object.keys(truthTable.dict).length > 8) {
            console.log(`   ... and ${Object.keys(truthTable.dict).length - 8} more`);
        }
        
        // Final warning summary
        if (duplicateInputs.length > 0 || duplicateOutputs.length > 0 || invalidInputs.length > 0 || invalidOutputs.length > 0) {
            console.log('\n⚠ TRUTH TABLE WARNINGS SUMMARY:');
            if (duplicateInputs.length > 0) console.log(`   - Duplicate inputs: ${[...new Set(duplicateInputs)].join(', ')}`);
            if (duplicateOutputs.length > 0) console.log(`   - Duplicate outputs: ${[...new Set(duplicateOutputs)].join(', ')}`);
            if (invalidInputs.length > 0) console.log(`   - Invalid input names: ${invalidInputs.join(', ')}`);
            if (invalidOutputs.length > 0) console.log(`   - Invalid output names: ${invalidOutputs.join(', ')}`);
        }
        
        console.log('');
        
        return truthTable;
    }
    
    // Save current circuit as a custom component with duplicate checking
    // Save current circuit as a custom component with full validation
    function saveAsCustomComponent() {
        // Generate truth table from current circuit
        const truthTable = generateTruthTable();
        
        if (!truthTable) {
            return;
        }
        
        // Get existing names for suggestions
        const existingNames = getCustomComponentNames();
        let defaultName = 'MY_CIRCUIT';
        
        // Suggest a unique name
        let counter = 1;
        while (existingNames.includes(defaultName)) {
            defaultName = `MY_CIRCUIT_${counter}`;
            counter++;
        }
        
        // Ask for component name
        let componentName = prompt(
            `Name your custom component:\n\n` +
            `Existing components: ${existingNames.length ? existingNames.join(', ') : 'none'}\n\n` +
            `Enter name:`,
            defaultName
        );
        
        if (!componentName) return;
        
        // Validate name (no special characters except spaces)
        if (!/^[a-zA-Z0-9\s_-]+$/.test(componentName)) {
            alert('Invalid name! Use only letters, numbers, spaces, underscores, and hyphens.');
            return saveAsCustomComponent(); // Try again
        }
        
        // Clean name for class
        const className = componentName.toUpperCase().replace(/[^A-Z0-9]/g, '_');
        
        // Check for duplicate
        if (window.customComponents && window.customComponents[className]) {
            const existing = window.customComponents[className];
            
            // Show detailed comparison
            const userChoice = confirm(
                `⚠️ DUPLICATE NAME DETECTED!\n\n` +
                `"${componentName}" already exists.\n\n` +
                `Existing component details:\n` +
                `  • Created: ${new Date(existing.created).toLocaleString()}\n` +
                `  • Inputs: ${existing.truth_table.input_count}\n` +
                `  • Outputs: ${existing.truth_table.output_count}\n` +
                `  • Truth table entries: ${Object.keys(existing.truth_table.dict).length}\n\n` +
                `Do you want to OVERWRITE it?\n` +
                `(Click Cancel to keep both and rename)`
            );
            
            if (!userChoice) {
                // Try to save with a modified name
                const newName = prompt(
                    `Enter a different name:\n\n` +
                    `Suggested: ${componentName}_2, ${componentName}_NEW, etc.`,
                    `${componentName}_2`
                );
                if (newName) {
                    componentName = newName;
                    // Continue with the new name (will recheck duplicate)
                } else {
                    return; // User cancelled
                }
            } else if (userChoice) {
                // User confirmed overwrite - delete existing
                deleteCustomComponentByName(className);
            }
        }
        
        // Re-clean name after potential rename
        const finalClassName = componentName.toUpperCase().replace(/[^A-Z0-9]/g, '_');
        
        // Store the truth table
        if (!window.customComponents) {
            window.customComponents = {};
        }
        
        window.customComponents[finalClassName] = {
            name: componentName,
            truth_table: truthTable,
            created: new Date().toISOString(),
            version: "1.0"
        };
        
        // Add to toolbar
        addToToolbar(finalClassName, componentName);
        
        // Update badge
        if (typeof updateCustomBadge === 'function') updateCustomBadge();
        
        console.log(`✅ Saved "${componentName}" as custom component`);
        console.log(`   Class: ${finalClassName}`);
        console.log(`   Inputs: ${truthTable.input_count}, Outputs: ${truthTable.output_count}`);
        console.log(`   Patterns: ${Object.keys(truthTable.dict).length}`);
        
        // Optional: Show success with details
        alert(
            `✓ "${componentName}" saved!\n\n` +
            `Inputs: ${truthTable.input_count}\n` +
            `Outputs: ${truthTable.output_count}\n`
        );
    }

    // Optional: Add rename functionality for custom components
    function renameCustomComponent() {
        if (!window.customComponents || Object.keys(window.customComponents).length === 0) {
            alert('No custom components to rename');
            return;
        }
        
        // Build list
        let list = 'Select component to rename:\n\n';
        const components = Object.entries(window.customComponents);
        components.forEach(([className, data], index) => {
            list += `${index + 1}. ${data.name} (${data.truth_table.input_count} in, ${data.truth_table.output_count} out)\n`;
        });
        
        const choice = prompt(list + '\n\nEnter number:');
        if (!choice) return;
        
        const index = parseInt(choice) - 1;
        if (index < 0 || index >= components.length) {
            alert('Invalid selection');
            return;
        }
        
        const [oldClassName, data] = components[index];
        const oldName = data.name;
        
        const newName = prompt(`Rename "${oldName}" to:`, oldName);
        if (!newName || newName === oldName) return;
        
        // Check for duplicate new name
        const newClassName = newName.toUpperCase().replace(/[^A-Z0-9]/g, '_');
        
        if (window.customComponents[newClassName] && newClassName !== oldClassName) {
            alert(`"${newName}" already exists! Delete or rename that one first.`);
            return;
        }
        
        // Create new entry
        window.customComponents[newClassName] = {
            ...data,
            name: newName,
            renamed: new Date().toISOString()
        };
        
        // Delete old
        delete window.customComponents[oldClassName];
        
        // Update toolbar
        const toolbarItems = document.querySelectorAll('.toolbar-item');
        for (let item of toolbarItems) {
            if (item.getAttribute('data-type') === oldClassName) {
                item.setAttribute('data-type', newClassName);
                item.textContent = `🔧 ${newName}`;
                break;
            }
        }
        
        console.log(`✅ Renamed "${oldName}" → "${newName}"`);
        alert(`Component renamed to "${newName}"`);
    }

    // Add rename button to controls (optional)
    // <button onclick="renameCustomComponent()" style="background: #4ec9b0;">✏️ Rename Custom</button>

    // Helper function to delete custom component by name
    function deleteCustomComponentByName(className) {
        if (!window.customComponents || !window.customComponents[className]) return false;
        
        const componentName = window.customComponents[className].name;
        
        // Remove from toolbar
        const toolbarItems = document.querySelectorAll('.toolbar-item');
        for (let item of toolbarItems) {
            if (item.getAttribute('data-type') === className) {
                item.remove();
                break;
            }
        }
        
        // Remove from storage
        delete window.customComponents[className];
        
        // Remove from localStorage
        const saved = localStorage.getItem('savedCustomComponents');
        if (saved) {
            try {
                const savedComponents = JSON.parse(saved);
                delete savedComponents[className];
                localStorage.setItem('savedCustomComponents', JSON.stringify(savedComponents));
            } catch(e) {}
        }
        
        console.log(`Deleted existing component: ${componentName}`);
        return true;
    }

    // Alternative: Check before showing prompt
    function checkDuplicateName(componentName) {
        if (!window.customComponents) return false;
        
        const className = componentName.toUpperCase().replace(/[^A-Z0-9]/g, '_');
        return !!window.customComponents[className];
    }

    // Get list of existing custom component names
    function getCustomComponentNames() {
        if (!window.customComponents) return [];
        return Object.values(window.customComponents).map(comp => comp.name);
    }

    // Add component to toolbar
    function addToToolbar(className, displayName) {
        const toolbar = document.getElementById('toolbar');
        
        const newItem = document.createElement('div');
        newItem.className = 'toolbar-item';
        newItem.setAttribute('data-type', className);
        newItem.setAttribute('data-custom', 'true');  // Mark as custom
        newItem.textContent = `🔧 ${displayName}`;
        
        // Add tooltip to show right-click deletes
        newItem.title = "Right-click to delete";
        
        // Make it draggable and clickable like other toolbar items
        newItem.setAttribute('draggable', 'true');
        newItem.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', className);
            e.dataTransfer.effectAllowed = 'copy';
        });
        
        newItem.addEventListener('click', (e) => {
            e.stopPropagation();
            window.selectedCustomType = className;
            document.getElementById('status').textContent = `Click canvas to place ${displayName}`;
            document.body.style.cursor = 'crosshair';
        });
        
        toolbar.appendChild(newItem);
    }
    
    // Clear all custom components from toolbar and storage
    function clearAllCustomComponents() {
        if (!window.customComponents || Object.keys(window.customComponents).length === 0) {
            alert('No custom components to clear');
            return;
        }
        
        const count = Object.keys(window.customComponents).length;
        
        if (confirm(`⚠️ Delete ALL ${count} custom component(s)?\n\nThis action cannot be undone!`)) {
            // Remove all custom toolbar items
            const toolbarItems = document.querySelectorAll('.toolbar-item');
            toolbarItems.forEach(item => {
                if (item.getAttribute('data-custom') === 'true') {
                    item.remove();
                }
            });
            
            // Clear the custom components storage
            window.customComponents = {};
            
            // Clear from localStorage
            localStorage.removeItem('savedCustomComponents');
            
            // Also clear from any saved circuit data in localStorage
            const savedCircuit = localStorage.getItem('logicSimulator_savedCircuit');
            if (savedCircuit) {
                try {
                    const circuitData = JSON.parse(savedCircuit);
                    if (circuitData.customComponents) {
                        circuitData.customComponents = {};
                        localStorage.setItem('logicSimulator_savedCircuit', JSON.stringify(circuitData));
                    }
                } catch(e) {}
            }
            
            // Clear selected custom type if any
            if (window.selectedCustomType) {
                window.selectedCustomType = null;
            }
            
            console.log(`✅ Cleared ${count} custom component(s)`);
            document.getElementById('status').textContent = `✓ Cleared ${count} custom component(s)`;
            
            setTimeout(() => {
                if (document.getElementById('status').textContent.includes('Cleared')) {
                    document.getElementById('status').textContent = 'Ready';
                }
            }, 2000);
        }
    }
